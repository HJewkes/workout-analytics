name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Security: Scan for leaked secrets
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Security: npm audit
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Audit only production dependencies — this is a published library, so its
      # security surface is what ships to consumers (currently just zod). Dev-only
      # advisories (vitest, expo-sqlite→react-native, etc.) don't reach consumers
      # and shouldn't gate releases.
      - run: npm audit --omit=dev --audit-level=critical

  # Lint and type checking
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  # Unit tests with coverage
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build migrations bundle
        run: npm run migrations:build
      - name: Verify migrations bundle is up to date
        run: |
          if ! git diff --exit-code src/schema/_generated.ts; then
            echo "::error::src/schema/_generated.ts is out of date. Run 'npm run migrations:build' locally and commit the result."
            exit 1
          fi
      - run: npm run test:coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Build verification (ESM-only)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Verify ESM-only build output
        run: |
          test -f dist/esm/index.js || (echo "ESM build missing" && exit 1)
          test -f dist/types/index.d.ts || (echo "Types missing" && exit 1)
          test ! -d dist/cjs || (echo "CJS build should not exist (ESM-only)" && exit 1)
          echo "ESM-only build verification passed"

  # Test on multiple Node versions (NF-01)
  node-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Build migrations bundle
        run: npm run migrations:build
      - name: Verify migrations bundle is up to date
        run: |
          if ! git diff --exit-code src/schema/_generated.ts; then
            echo "::error::src/schema/_generated.ts is out of date. Run 'npm run migrations:build' locally and commit the result."
            exit 1
          fi
      - run: npm run test
